<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito - Online Doggie</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="assets/img/ONLINE-DOGGIE ICO.ico">
</head>

<body>

    <header class="header">
        <div class="logo">
            <img src="assets/img/ONLINE-DOGGIE ICO.ico" alt="Logo Online Doggie">
            <h1>Online Doggie</h1>
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li class="active"><a href="carrito.html">Carrito</a></li>
                <li><a href="perfil.html">Mi Perfil</a></li>
                <li><a href="Login.html" class="btn-login">Login</a></li>
            </ul>
        </nav>
    </header>

    <main style="padding:40px">

        <h1>🛒 Tu Carrito</h1>

        <!-- Productos en carrito -->
        <table border="1" width="100%">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Eliminar</th>
                </tr>
            </thead>
            <tbody id="carrito-body"></tbody>
        </table>

        <h2 id="total">Total: $0</h2>

        <!-- Cupón de descuento -->
        <div class="cupon-box">
            <h3>¿Tienes un cupón?</h3>
            <div class="cupon-form">
                <input type="text" id="input-cupon" placeholder="Ingresa tu código">
                <button onclick="aplicarCupon()">Aplicar</button>
            </div>
            <p id="mensaje-cupon"></p>
        </div>

        <button onclick="vaciarCarrito()" class="btn-agregar">
            Vaciar carrito
        </button>

        <br><br>

        <!-- Confirmar pedido -->
        <button onclick="finalizarCompra()" class="btn-agregar">
            Finalizar compra
        </button>

    </main>

    <footer class="footer">
        <p>© 2025 Online Doggie — Todos los derechos reservados.</p>
    </footer>

    <script src="./js/carrito.js"></script>

</body>

</html>
