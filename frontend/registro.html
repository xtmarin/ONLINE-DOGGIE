<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Registro - Online Doggie</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="assets/img/ONLINE-DOGGIE ICO.ico">
</head>

<body>

    <main class="registro-section">

        <section class="registro">

            <img src="./assets/img/ONLINE-DOGGIE ICO.ico" alt="Logo de la tienda" class="logo">

            <h2>Crear una cuenta</h2>

            <form id="form-registro">

                <div class="form-group">
                    <label>🐶 Nombre completo</label>
                    <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
                </div>

                <div class="form-group">
                    <label>🐱 Correo electrónico</label>
                    <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required>
                </div>

                <div class="form-group">
                    <label>🦴 Contraseña</label>
                    <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                </div>

                <button type="submit">Registrarse</button>

                <p class="login-link">
                    ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
                </p>

            </form>

        </section>

    </main>

    <script src="./js/registro.js"></script>

</body>

</html>
