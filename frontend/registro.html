<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Online Doggie</title>
    
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="https://online-doggie-backend-production.up.railway.app/uploads/ONLINE-DOGGIE%20ICO.ico" type="image/x-icon">

    <script>
        if (localStorage.getItem('token')) {
            window.location.replace('index.html');
        }
    </script>
</head>

<body>

    <header class="header">
        <div class="logo">
            <img src="https://online-doggie-backend-production.up.railway.app/uploads/ONLINE-DOGGIE%20ICO.ico" alt="Logo Online Doggie">
            <h1>Online Doggie</h1>
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="login.html" class="btn-login">Login</a></li>
            </ul>
        </nav>
    </header>

    <main class="registro-section">
        <section class="registro">

            <img src="https://online-doggie-backend-production.up.railway.app/uploads/ONLINE-DOGGIE%20ICO.ico" alt="Logo de la tienda" class="logo">

            <div id="seccion-registro">
                <h2>Crear una cuenta</h2>
                <form id="form-registro">
                    <div class="form-group">
                        <label for="nombre">🐶 Nombre completo</label>
                        <input type="text" id="nombre" placeholder="Ej. Juan Pérez" required>
                    </div>

                    <div class="form-group">
                        <label for="email">🐱 Correo electrónico</label>
                        <input type="email" id="email" placeholder="tucorreo@ejemplo.com" required>
                    </div>

                    <div class="form-group">
                        <label for="password">🦴 Contraseña</label>
                        <input type="password" id="password" placeholder="Mínimo 8 caracteres" required>
                    </div>

                    <div class="form-group">
                        <label for="direccion">📍 Dirección de envío</label>
                        <input type="text" id="direccion" placeholder="Ej. Calle 10 #25-45" required>
                    </div>

                    <button type="submit">Registrarse</button>

                    <p class="login-link">
                        ¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a>
                    </p>
                </form>
            </div>

            <div id="seccion-verificacion" style="display: none;">
                <h2>Verifica tu cuenta</h2>
                <p style="font-size: 14px; color: #666; margin-bottom: 20px; text-align: center;">
                    Te hemos enviado un código de 6 dígitos a tu correo electrónico. Por favor, ingrésalo a continuación:
                </p>
                <form id="form-verificacion">
                    <div class="form-group">
                        <label for="codigo">📩 Código de Verificación</label>
                        <input type="text" id="codigo" placeholder="Ej. 123456" maxlength="6" required
                            style="text-align: center; font-size: 18px; letter-spacing: 2px;">
                    </div>

                    <button type="submit" class="btn-confirmar">Confirmar Código</button>
                </form>
            </div>

        </section>
    </main>

    <footer class="footer footer-simple">
        <div class="footer-content">
            <p>&copy; 2026 Online Doggie. Todos los derechos reservados.</p>
        </div>
    </footer>


    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="./js/toast.js"></script>
    <script src="./js/usuario-navbar.js"></script>
    <script src="./js/registro.js"></script>

</body>
</html>
