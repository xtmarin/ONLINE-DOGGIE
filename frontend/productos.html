<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Productos - Online Doggie</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" href="assets/img/ONLINE-DOGGIE ICO.ico">
</head>

<body>

    <!-- HEADER -->
    <header class="header">
        <div class="logo">
            <img src="assets/img/ONLINE-DOGGIE ICO.ico" alt="Logo Online Doggie">
            <h1>Online Doggie</h1>
        </div>

        <!-- Menú moderno -->
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li class="active"><a href="productos.html">Productos</a></li>
                <li><a href="perfil.html">Mi Perfil</a></li>
                <li><a href="login.html" class="btn-login">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- BANNER -->
    <section class="banner-productos">
        <h2>Nuestros productos</h2>
        <p>Todo lo que tu mascota necesita 🐶🐱</p>
    </section>

    <!-- BUSCADOR Y FILTROS -->
    <section class="filtros">
        <input type="text"  id="buscador" placeholder="Buscar producto..." class="buscador">

        <select id="filtro-categoria" class="select-filtro">
            <option value="todos">Todas las categorías</option>
            <option value="perros">Perros</option>
            <option value="gatos">Gatos</option>
            <option value="accesorios">Accesorios</option>
        </select>
    </section>

    <!-- LISTA DE PRODUCTOS -->
    <section class="lista-productos" id="lista-productos">

     <!-- Aquí se cargarán los productos desde la base de datos -->

    </section>

    <!-- Overlay oscuro -->
    <div id="overlay-mini"></div>

    <!-- MINI CARRITO -->
    <div id="mini-carrito" class="mini-carrito">
        <div class="mini-header">
            <h3>🛒 Tu carrito</h3>
            <button id="cerrar-mini">✕</button>
        </div>

        <div id="mini-carrito-body"></div>

        <div class="mini-footer">
            <p id="mini-total">Total: $0</p>
            <a href="carrito.html" class="btn-ver-carrito">Finalizar compra</a>
        </div>
    </div>

    <!-- BOTÓN FLOTANTE CARRITO -->
    <div class="carrito-flotante" onclick="abrirMiniCarrito()">
        🛒
        <span id="contador-carrito">0</span>
    </div>

    <footer class="footer">
        <p>© 2025 Online Doggie — Todos los derechos reservados.</p>
    </footer>

    <script src="./js/filtros-productos.js"></script>
    <script src="./js/carrito-funciones.js"></script>
    <script src="./js/productos.js"></script>
    <script src="./js/carrito.js"></script>

</body>

</html>
