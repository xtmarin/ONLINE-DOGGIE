<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONLINE DOGGIE</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="assets/img/ONLINE-DOGGIE ICO.ico" type="image/x-icon">
</head>

<body>
   <header class="header">
        <div class="logo">
            <img src="assets/img/ONLINE-DOGGIE ICO.ico" alt="Logo Online Doggie">
            <h1>Online Doggie</h1>
        </div>

        <!-- Menú moderno -->
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li class="active"><a href="productos.html">Productos</a></li>
                <li><a href="carrito.html">Carrito</a></li>
                <li><a href="perfil.html">Mi Perfil</a></li>
                <li><a href="login.html" class="btn-login">Login</a></li>
            </ul>
        </nav>
    </header>

    <!-- Inicio del formulario de inicio de seccion-->
    <main class="registro-section">
        <section class="registro">
            <img src="./assets/img/ONLINE-DOGGIE ICO.ico" alt="Logo de la tienda" class="logo">
            <h2> Iniciar sesión </h2>
            <form id="loginForm">
                
                <div class="form-group">
                    <label for="email">🐶 Correo electrónico</label>
                    <input type="email" id="email" name="email" required placeholder="tucorreo@ejemplo.com">
                </div>

                <div class="form-group">
                    <label for="password">🐱 Contraseña</label>
                    <input type="password" id="password" name="password" required placeholder="Mínimo 8 caracteres">
                </div>

                <button type="submit">Iniciar sesión</button>
                <p class="login-link">¿Ya tienes una cuenta? <a href="login.html">Inicia sesión</a></p>
            </form>
        </section>
    </main>

    <!-- Fin del formulario de inicio de seccion-->


<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    try {
        const respuesta = await fetch("http://localhost:3000/api/auth/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email,
                password
            })
        });

        const data = await respuesta.json();

        if (respuesta.ok) {
            // 🔥 Guardamos token y usuario
            localStorage.setItem("token", data.token);
            localStorage.setItem("usuario", JSON.stringify(data.usuario));

            alert("Login exitoso 🚀");

            // 🔥 Redirigir según rol
            if (data.usuario.rol === "admin") {
                window.location.href = "admin.html";
            } else {
                window.location.href = "index.html";
            }

        } else {
            alert(data.mensaje);
        }

    } catch (error) {
        console.error("Error:", error);
        alert("Error conectando con el servidor");
    }
});
</script>




    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 Persona Profesional. Todos los derechos reservados.</p>
        </div>
    </footer>



</body>
</html>
