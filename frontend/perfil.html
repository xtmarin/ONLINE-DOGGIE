<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Online Doggie</title>
    <link rel="stylesheet" href="./css/style.css">
    <link rel="shortcut icon" href="assets/img/ONLINE-DOGGIE ICO.ico" type="image/x-icon">
</head>

<body>

    <header class="header">
        <div class="logo">
            <img src="assets/img/ONLINE-DOGGIE ICO.ico" alt="Logo Online Doggie">
            <h1>Online Doggie</h1>
        </div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li class="active"><a href="perfil.html">Mi Perfil</a></li>
            </ul>
        </nav>
    </header>

    <main class="main-content">
        <section class="perfil-container">

            <div class="perfil-col-izquierda">
                
                <div class="perfil-seccion seguimiento-simulado">
                    <h3>📦 Estado de mi último pedido</h3>
                    <p id="estado-pedido" class="badge-estado">Cargando...</p>
                </div>

                <div class="perfil-seccion">
                    <h3>Historial de compras</h3>
                    <div id="historial-compras">
                        <p>Cargando historial...</p>
                    </div>
                </div>

                <div class="perfil-seccion perfil-card-datos">
                    <h3>👤 Mi Perfil</h3>
                    <div class="perfil-card">
                        <p><strong>Nombre:</strong> <span id="perfil-nombre"></span></p>
                        <p><strong>Email:</strong> <span id="perfil-email"></span></p>
                        <p><strong>Rol:</strong> <span id="perfil-rol"></span></p>
                        <button id="logout-btn" class="btn-danger">Cerrar sesión</button>
                    </div>
                </div>

            </div>

            <div class="perfil-col-derecha">

                <div class="perfil-seccion direccion-envio">
                    <h3>📍 Dirección de entrega</h3>
                    <div class="form-group">
                        <label>Dirección</label>
                        <input type="text" id="input-direccion" placeholder="Calle 123 #45-67, Ciudad...">
                    </div>
                    <button onclick="guardarDireccion()" class="btn-submit">Actualizar dirección</button>
                    <p id="mensaje-direccion"></p>
                </div>

                <div class="perfil-seccion">
                    <h3>Editar perfil</h3>
                    <form id="form-editar-perfil">
                        <div class="form-group">
                            <label>Nombre</label>
                            <input type="text" id="edit-nombre" placeholder="Nuevo nombre" required>
                        </div>
                        <div class="form-group">
                            <label>Correo electrónico</label>
                            <input type="email" id="edit-email" placeholder="Nuevo correo" required>
                        </div>
                        <button type="submit" class="btn-submit">Guardar cambios</button>
                    </form>
                </div>

                <div class="perfil-seccion">
                    <h3>Cambiar contraseña</h3>
                    <form id="form-cambiar-password">
                        <div class="form-group">
                            <label>Contraseña actual</label>
                            <input type="password" id="password-actual" placeholder="Contraseña actual" required>
                        </div>
                        <div class="form-group">
                            <label>Nueva contraseña</label>
                            <input type="password" id="password-nueva" placeholder="Mínimo 8 caracteres" required>
                        </div>
                        <div class="form-group">
                            <label>Confirmar nueva contraseña</label>
                            <input type="password" id="password-confirmar" placeholder="Repite la nueva contraseña" required>
                        </div>
                        <button type="submit" class="btn-submit">Cambiar contraseña</button>
                    </form>
                </div>

            </div>

        </section>
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2025 Online Doggie. Todos los derechos reservados.</p>
        </div>
    </footer>

    <script src="./js/perfil.js"></script>

</body>

</html>
